<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Verili Spot Grid Bot Hesaplayıcı (USDT)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .container {
            background-color: #f8fafc;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        h2 { text-align: center; color: #d97706; margin-top: 0; font-size: 24px; }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-box { display: flex; flex-direction: column; }
        label { margin-bottom: 6px; font-size: 13px; color: #64748b; font-weight: 600; }
        input, select {
            padding: 12px;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: #1e293b;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #d97706; box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.2); }
        button {
            grid-column: span 2;
            padding: 14px;
            background-color: #f59e0b;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #d97706; }
        .results {
            margin-top: 25px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .summary {
            background-color: #f1f5f9;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f59e0b;
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #e2e8f0; color: #475569; }
        .row-sat { color: #dc2626; font-weight: bold; background-color: rgba(220, 38, 38, 0.04); }
        .row-al { color: #16a34a; font-weight: bold; background-color: rgba(22, 163, 74, 0.04); }
        .row-notr { color: #0f172a; background-color: #cbd5e1; font-weight: bold; }
        .loading { text-align: center; color: #d97706; font-weight: bold; padding: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 YAVUZ TAŞPINAR CANLI BOT AL SAT HESAP PLANLAMA (USDT Paritesi)</h2>
    
    <div class="input-group">
        <div class="input-box">
            <label>Coin Kodu (Örn: JTO, BTC, ETH, SOL)</label>
            <input type="text" id="coinSymbol" value="JTO" style="text-transform: uppercase;">
        </div>
        <div class="input-box">
            <label>Maksimum Düşüş/Yükseliş Aralığı (%)</label>
            <input type="number" id="percentRange" value="10">
        </div>
        <div class="input-box">
            <label>Toplam Bütçe (USDT)</label>
            <input type="number" id="totalBudget" value="10000">
        </div>
        <div class="input-box">
            <label>Kademe Başına Tutar (USDT)</label>
            <input type="number" id="stepAmount" value="1500">
        </div>
        <button id="calcBtn" onclick="fetchLivePrices()">Canlı Fiyatı Çek ve Botu Tasarla</button>
    </div>

    <div id="loadingText" class="loading">⏳ Canlı borsadan fiyatlar alınıyor...</div>

    <div class="results" id="resultsArea" style="display:none;">
        <div class="summary" id="summaryBox"></div>
        
        <h3>📋 Tahtaya Dizilecek Canlı Bot Emirleri</h3>
        <table>
            <thead>
                <tr>
                    <th>Kademe</th>
                    <th>Fiyat Seviyesi (USDT)</th>
                    <th>Yapılacak İşlem (Bota Verilecek Talimat)</th>
                    <th>İşlem Tutarı (USDT)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
async function fetchLivePrices() {
    const coinInput = document.getElementById('coinSymbol').value.toUpperCase().trim();
    const loadingText = document.getElementById('loadingText');
    const resultsArea = document.getElementById('resultsArea');
    const calcBtn = document.getElementById('calcBtn');

    if(!coinInput) { alert("Lütfen geçerli bir coin kodu girin!"); return; }

    loadingText.style.display = 'block';
    resultsArea.style.display = 'none';
    calcBtn.disabled = true;

    try {
        // 1. Adım: Seçilen coinin USDT fiyatını çek
        const coinResponse = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${coinInput}USDT`);
        if(!coinResponse.ok) throw new Error("Coin kodu bulunamadı veya Binance API hatası!");
        const coinData = await coinResponse.json();
        const currentPriceUSDT = parseFloat(coinData.price);

        // Hesaplama fonksiyonunu tetikle
        generateGridTable(currentPriceUSDT, coinInput);

    } catch (error) {
        alert("Hata oluştu: " + error.message + "\nLütfen coin kodunu (Örn: JTO) doğru yazdığınızdan emin olun.");
    } finally {
        loadingText.style.display = 'none';
        calcBtn.disabled = false;
    }
}

function generateGridTable(currentPrice, coinSymbol) {
    const totalBudget = parseFloat(document.getElementById('totalBudget').value);
    const stepAmount = parseFloat(document.getElementById('stepAmount').value);
    const percentRange = parseFloat(document.getElementById('percentRange').value) / 100;

    const totalGrids = Math.floor(totalBudget / stepAmount);
    const minPrice = currentPrice * (1 - percentRange);
    const maxPrice = currentPrice * (1 + percentRange);
    
    const priceRangeTotal = maxPrice - minPrice;
    const priceStep = priceRangeTotal / (totalGrids - 1);

    // Özet Alanı
    document.getElementById('summaryBox').innerHTML = `
        <strong>🟢 CANLI VERİ BAĞLANTISI BAŞARILI:</strong><br>
        • <strong>${coinSymbol} Canlı Fiyatı:</strong> <strong>${currentPrice.toFixed(4)} USDT</strong><br>
        • <strong>Strateji:</strong> Toplam bütçe ile <strong>${totalGrids} adet</strong> ${stepAmount.toLocaleString('tr-TR')} USDT'lik emir bloku oluşturuldu.<br>
        • <strong>Alt Limit (Taban):</strong> ${minPrice.toFixed(4)} USDT | <strong>Üst Limit (Tavan):</strong> ${maxPrice.toFixed(4)} USDT<br>
        • Her kademe arası fiyat adımı: <strong>${priceStep.toFixed(4)} USDT (%${((priceStep/currentPrice)*100).toFixed(2)})</strong>
    `;

    // Tablo Oluşturma
    let tableHTML = '';
    for (let i = totalGrids - 1; i >= 0; i--) {
        let gridPrice = minPrice + (priceStep * i);
        let action = '';
        let rowClass = '';

        if (gridPrice > currentPrice * 1.002) {
            action = `📈 SATIŞ emri yerleştir (Bu fiyata gelirse ${stepAmount} USDT'lik sat)`;
            rowClass = 'row-sat';
        } else if (gridPrice < currentPrice * 0.998) {
            action = `📉 ALIŞ emri yerleştir (Bu fiyata düşerse ${stepAmount} USDT'lik al)`;
            rowClass = 'row-al';
        } else {
            action = `🎯 ANLIK BAŞLANGIÇ FİYATI (Nötr İstasyon)`;
            rowClass = 'row-notr';
            gridPrice = currentPrice;
        }

        tableHTML += `
            <tr class="${rowClass}">
                <td>Kademe ${i + 1}</td>
                <td><strong>${gridPrice.toFixed(4)} USDT</strong></td>
                <td>${action}</td>
                <td>${stepAmount.toLocaleString('tr-TR')} USDT</td>
            </tr>
        `;
    }

    document.getElementById('tableBody').innerHTML = tableHTML;
    document.getElementById('resultsArea').style.display = 'block';
}
</script>

</body>
</html>
