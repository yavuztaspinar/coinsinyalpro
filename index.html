<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalinaSavar Pro - Dip Uyuşmazlık Avcısı</title>
    <style>
        :root {
            --bg: #ffffff;       
            --card: #f8f9fa;     
            --text: #1e2329;     
            --text-muted: #5e6673;
            --gold: #c79d00;     
            --gold-hover: #b08b00;
            --gold-btn: #fcd535;
            --green: #0ecb81;
            --red: #f6465d;
            --blue: #2f80ed;
            --border: #eaecef;   
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .scanner-box {
            width: 100%;
            max-width: 1600px;
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        h2 { 
            text-align: center; 
            color: var(--text); 
            margin-top: 0; 
            font-size: 28px; 
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .grid-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #f1f3f5; 
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        select, input, button {
            padding: 14px;
            background: #ffffff;
            border: 1px solid #cdc1c1;
            color: var(--text); 
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
        }
        select:focus, input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(199, 157, 0, 0.2); }
        button {
            background: var(--gold-btn);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }
        button:hover { background: #f3ba2f; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(243, 186, 47, 0.3); }
        button:disabled { background: #e9ecef; color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
        .status-panel {
            text-align: center;
            margin: 30px 0;         
            font-weight: 700;
            font-size: 18px;
        }
        .bar-container {
            width: 100%;
            background: #e9ecef;
            height: 10px;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .bar-inner { width: 0%; height: 100%; background: var(--gold); transition: width 0.1s ease-out; }
         
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 25px;
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; display: none; background: #ffffff; min-width: 1200px; }
        th, td { padding: 18px 14px; text-align: left; border-bottom: 2px solid var(--border); font-size: 15px; }
        th { background: #e9ecef; color: var(--text); font-size: 14px; font-weight: 700; text-transform: uppercase; } 
        .match-row { background: #ffffff; animation: fadeIn 0.3s ease-in-out; } 
        .match-row:hover { background: #f8f9fa; } 
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 13px; margin-right: 4px; display: inline-block; font-weight: 700; }
        .badge-confirm { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; }
        .badge-strong-confirm { background: rgba(142, 68, 173, 0.15); color: #8e44ad; border: 1px solid #8e44ad; }
        .badge-weak-confirm { background: rgba(127, 140, 141, 0.15); color: #7f8c8d; border: 1px solid #7f8c8d; }
        .badge-trade { font-size: 14px; letter-spacing: 0.5px; border: 1px solid transparent; width: 70px; text-align: center; }
        .trade-buy { background: rgba(14, 203, 129, 0.15); color: #0db372; border-color: var(--green); }
        .trade-sell { background: rgba(246, 70, 93, 0.15); color: #df334a; border-color: var(--red); }
        .trade-hold { background: rgba(132, 142, 156, 0.15); color: var(--text-muted); border-color: var(--text-muted); }
        .large-numeric { font-family: 'Courier New', Courier, monospace; font-size: 17px; font-weight: 700; color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="scanner-box">
    <h2>🎯 BALİNASAVAR PRO // DİP UYUMSUZLUK AVCISI</h2>
    <div class="grid-controls">
        <div class="input-group">
            <label>Veri Kaynağı Modu</label>
            <select id="sourceMode">
                <option value="binance" selected>Binance Canlı Matris (Güvenli Proxy)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Zaman Periyodu</label>
            <select id="tf">
                <option value="15m">15 Dakika (Hızlı)</option>
                <option value="1h" selected>1 Saat (Önerilen)</option>
                <option value="4h">4 Saat (Güçlü Trend)</option>
                <option value="1d">1 Gün (Makro)</option>
            </select>
        </div>
        <div class="input-group" id="filterGroup">
            <label id="filterLabel">24s Hacim Filtresi</label>
            <select id="filterChoice">
                <option value="all">Tümünü Tara (Sınır Yok)</option>
                <option value="100k-500k">100k - 500k USDT</option>
                <option value="500k-2m">500k - 2M USDT</option>
                <option value="2m-all" selected>2M USDT ve Üzeri (Güvenli)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Aşırı Satım Sınırı (RSI)</label>
            <select id="limit">
                <option value="35">RSI 35 Altı</option>
                <option value="30" selected>RSI 30 Altı</option>
                <option value="25">RSI 25 Altı</option>
            </select>
        </div>
        <div class="input-group">
            <label>Tarama Algoritması</label>
            <select id="strategyMode">
                <option value="all" selected>Tüm Sinyal ve Dipler</option>
                <option value="reversal">Sadece Dönüş & Uyuşmazlık</option>
                <option value="pure_dip">Sadece Mutlak Diptekiler</option>
            </select>
        </div>
        <div class="input-group" style="justify-content: flex-end;">
            <button id="btn" onclick="huntCombinations()">Avı Başlat</button>
        </div>
    </div>

    <div class="status-panel">
        <span id="info">Sistem hazır. Canlı matris bağlantısı bekleniyor...</span>
        <div id="barBg" class="bar-container"><div id="bar" class="bar-inner"></div></div>
    </div>

    <div class="table-responsive">
        <table id="table">
            <thead>
                <tr>
                    <th>Parite</th>
                    <th>24s Hacim</th>
                    <th>Arz Riski</th>
                    <th>Sinyal Durumu</th>
                    <th>Onay</th>
                    <th>MA Trend Kesişim</th>
                    <th>Karar</th>
                    <th>RSI</th>
                    <th>MACD</th>
                    <th>Hacim MA</th>
                    <th>VWMA Durumu</th>
                    <th>Dip Mesafe</th>
                    <th>Anlık Fiyat</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<script>
    let backupCryptoMatrix = [];

    const riskliArzListesi = {
        "STRK": { risk: "KİLİT AÇILIMI", detay: "Her ayın 15'inde kilit açılımı baskısı.", maxArz: "Sınırlı" },
        "ZEC": { risk: "GİZLİ HAVUZ", detay: "Teknik arz takibi belirsiz.", maxArz: "21 Milyon" },
        "W": { risk: "ENFLASYON", detay: "Erken dönem kilit açılımları mevcut.", maxArz: "Yüksek Arz" }
    };

    // AllOrigins proxy sarmalayıcısından veriyi güvenle çıkaran fonksiyon
    async function fetchFromProxy(targetUrl) {
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error("Proxy bağlantı hatası.");
        const wrapperData = await response.json();
        // wrapperData.contents string olarak döner, onu JSON objesine çeviriyoruz
        return JSON.parse(wrapperData.contents);
    }

    async function entegreEtVeYukle() {
        try {
            document.getElementById("info").innerText = "⏳ Binance veri matrisi senkronize ediliyor...";
            const infoData = await fetchFromProxy('https://api.binance.com/api/v3/exchangeInfo');

            let currentRank = 1;
            backupCryptoMatrix = infoData.symbols
                .filter(s => s.status === 'TRADING' && s.symbol.endsWith('USDT') && !s.symbol.includes("UP") && !s.symbol.includes("DOWN"))
                .map(s => {
                    return {
                        "rank": currentRank++,
                        "symbol": s.baseAsset,
                        "pair": s.symbol
                    };
                });
            document.getElementById("info").style.color = "var(--green)";
            document.getElementById("info").innerText = `✅ Bağlantı kuruldu! Toplam ${backupCryptoMatrix.length} adet canlı parite taramaya hazır.`;
        } catch (error) {
            console.error(error);
            document.getElementById("info").style.color = "var(--red)";
            document.getElementById("info").innerText = "❌ Binance API bağlantı hatası! Sayfayı yenileyin.";
        }
    }

    window.onload = function() {
        entegreEtVeYukle();
    };

    function calculateAllRSI(klines) {
        if (!klines || klines.length < 15) return [];
        let len = klines.length;
        let rsiValues = new Array(len).fill(null);
        
        let gains = [];
        let losses = [];
        
        for (let i = 1; i < len; i++) {
            let diff = parseFloat(klines[i][4]) - parseFloat(klines[i-1][4]);
            gains.push(diff > 0 ? diff : 0);
            losses.push(diff < 0 ? Math.abs(diff) : 0);
        }
        
        let sumGains = 0;
        let sumLosses = 0;
        for (let i = 0; i < 14; i++) {
            sumGains += gains[i];
            sumLosses += losses[i];
        }
        
        let avgGain = sumGains / 14;
        let avgLoss = sumLosses / 14;
        rsiValues[14] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
        
        for (let i = 14; i < gains.length; i++) {
            avgGain = (avgGain * 13 + gains[i]) / 14;
            avgLoss = (avgLoss * 13 + losses[i]) / 14;
            rsiValues[i + 1] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
        }
        return rsiValues;
    }

    function calculateEMA(data, period) {
        if (data.length < period) return new Array(data.length).fill(0);
        let k = 2 / (period + 1);
        let ema = new Array(data.length).fill(0);
        let sum = 0;
        for (let i = 0; i < period; i++) sum += data[i];
        ema[period - 1] = sum / period;
        for (let i = period; i < data.length; i++) {
            ema[i] = (data[i] * k) + (ema[i - 1] * (1 - k));
        }
        return ema;
    }

    function calculateSMA(data, period) {
        if (data.length < period) return new Array(data.length).fill(0);
        let sma = new Array(data.length).fill(0);
        let sum = 0;
        for (let i = 0; i < period; i++) sum += data[i];
        sma[period - 1] = sum / period;
        for (let i = period; i < data.length; i++) {
            sum = sum - data[i - period] + data[i];
            sma[i] = sum / period;
        }
        return sma;
    }

    function checkGoldenDeathCross(klines) {
        if (!klines || klines.length < 202) return { state: "Yetersiz Veri", isBullish: false, isBearish: false };
        
        let closePrices = klines.map(k => parseFloat(k[4]));
        let sma50 = calculateSMA(closePrices, 50);
        let sma200 = calculateSMA(closePrices, 200);
        
        let len = closePrices.length;
        let currentSma50 = sma50[len - 1];
        let currentSma200 = sma200[len - 1];
        let prevSma50 = sma50[len - 2];
        let prevSma200 = sma200[len - 2];

        if (prevSma50 <= prevSma200 && currentSma50 > currentSma200) {
            return { state: "🌟 GOLDEN CROSS", isBullish: true, isBearish: false };
        } else if (prevSma50 >= prevSma200 && currentSma50 < currentSma200) {
            return { state: "💀 DEATH CROSS", isBullish: false, isBearish: true };
        } else if (currentSma50 > currentSma200) {
            return { state: "📈 Boğa (SMA50 > 200)", isBullish: true, isBearish: false };
        } else {
            return { state: "📉 Ayı (SMA50 < 200)", isBullish: false, isBearish: true };
        }
    }

    function calculateMACD(klines) {
        if (!klines || klines.length < 35) return null;
        try {
            let closePrices = klines.map(k => parseFloat(k[4]));
            let ema12 = calculateEMA(closePrices, 12);
            let ema26 = calculateEMA(closePrices, 26);
            
            let macdLine = new Array(closePrices.length).fill(0);
            for (let i = 0; i < closePrices.length; i++) {
                macdLine[i] = ema12[i] - ema26[i];
            }
            let signalLine = calculateEMA(macdLine, 9);
            let len = closePrices.length;
            return {
                macd: macdLine[len - 1],
                signal: signalLine[len - 1],
                prevMacd: macdLine[len - 2],
                prevSignal: signalLine[len - 2]
            };
        } catch(e) { return null; }
    }

    function checkVolumeSpike(klines) {
        if (!klines || klines.length < 21) return null;
        let volumes = klines.map(k => parseFloat(k[5]));
        let currentVol = volumes[volumes.length - 1];
        let previous20Vol = volumes.slice(-21, -1);
        let avgVol = previous20Vol.reduce((a, b) => a + b, 0) / 20;
        if(avgVol === 0) return { isSpike: false, ratio: "1.00" };
        return {
            isSpike: currentVol > (avgVol * 1.25), 
            ratio: (currentVol / avgVol).toFixed(2)
        };
    }

    function calculateHistoricalDip(klines) {
        if(!klines || klines.length < 30) return null;
        let currentPrice = parseFloat(klines[klines.length - 1][4]);
        let lows = klines.map(k => parseFloat(k[3]));
        let absoluteLow = Math.min(...lows);
        if(absoluteLow === 0) return { isPureDip: false, distance: "0.00" };
        let distanceToLow = ((currentPrice - absoluteLow) / absoluteLow) * 100;
        return {
            isPureDip: distanceToLow <= 1.2,
            distance: distanceToLow.toFixed(2)
        };
    }

    function checkBullishDivergence(klines, rsiValues) {
        if (!klines || klines.length < 35 || rsiValues.length < 35) return { isDiv: false, rsiDiff: "0.00" };
        try {
            let len = klines.length;
            let currentLow = parseFloat(klines[len - 1][3]);
            let currentRSI = rsiValues[len - 1];

            if(currentRSI === null || currentRSI > 45) return { isDiv: false, rsiDiff: "0.00" };

            for(let i = len - 25; i < len - 4; i++) {
                let pastLow = parseFloat(klines[i][3]);
                let pastRSI = rsiValues[i];
                if(pastRSI !== null && currentLow < pastLow && currentRSI > pastRSI && pastRSI < 35) {
                    return { isDiv: true, rsiDiff: (currentRSI - pastRSI).toFixed(2) };
                }
            }
        } catch (e) { return { isDiv: false, rsiDiff: "0.00" }; }
        return { isDiv: false, rsiDiff: "0.00" };
    }

    function calculateVWMAAndCross(klines, period = 20) {
        if (!klines || klines.length < (period + 2)) return { state: "N/A", isBullish: false };
        
        let len = klines.length;

        let pvSumCurrent = 0, vSumCurrent = 0, closeSumCurrent = 0;
        for (let i = 0; i < period; i++) {
            let kCurrent = klines[len - 1 - i];
            let closeC = parseFloat(kCurrent[4]);
            let volC = parseFloat(kCurrent[5]);
            pvSumCurrent += (closeC * volC);
            vSumCurrent += volC;
            closeSumCurrent += closeC;
        }
        let vwmaCurrent = vSumCurrent === 0 ? 0 : pvSumCurrent / vSumCurrent;
        let smaCurrent = closeSumCurrent / period;

        let pvSumPrev = 0, vSumPrev = 0, closeSumPrev = 0;
        for (let i = 0; i < period; i++) {
            let kPrev = klines[len - 2 - i];
            let closeP = parseFloat(kPrev[4]);
            let volP = parseFloat(kPrev[5]);
            pvSumPrev += (closeP * volP);
            vSumPrev += volP;
            closeSumPrev += closeP; 
        }
        let vwmaPrev = vSumPrev === 0 ? 0 : pvSumPrev / v
